name: Android Build
on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Build with Gradle
        run: ./gradlew build --no-daemon --no-configuration-cache
      - name: Publish smoke artifacts to Maven local
        run: ./gradlew publishToMavenLocal --no-daemon --no-configuration-cache -Pgroup=com.github.renetik.renetik-android-framework -Pversion=0.0.0-smoke
      - name: Build consumer smoke app
        run: ./gradlew -p consumer-smoke assembleDebug --no-daemon --no-configuration-cache -PsmokeVersion=0.0.0-smoke
