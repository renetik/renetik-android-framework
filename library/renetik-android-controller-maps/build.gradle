rootProject.ext.namespace = 'renetik.android.maps'
if (!rootProject.ext.is_renetik_development) apply from: '../../library.gradle'
else apply from: '../../../library.gradle'
dependencies {
    if (rootProject.ext.is_renetik_development)
        implementation project(':renetik-android-core')
    else implementation "com.github.renetik:renetik-android-core:master-SNAPSHOT"

    if (rootProject.ext.is_renetik_development)
        implementation project(':renetik-android-event')
    else implementation "com.github.renetik:renetik-android-event:master-SNAPSHOT"

    if (rootProject.ext.is_renetik_development)
        implementation project(':renetik-android-json')
    else implementation "com.github.renetik:renetik-android-json:master-SNAPSHOT"

    if (rootProject.ext.is_renetik_development)
        implementation project(':renetik-android-store')
    else implementation "com.github.renetik:renetik-android-store:master-SNAPSHOT"

    implementation project(':renetik-android-ui')
    implementation project(':renetik-android-imaging')
    implementation project(':renetik-android-controller')

    implementation "com.google.android.gms:play-services-location:21.0.1"
    implementation "com.google.android.gms:play-services-maps:18.1.0"
}
